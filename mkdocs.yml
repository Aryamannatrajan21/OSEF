    - Software Requirements Specification: SRS.md
    - Cross-Language Certification: CROSS_LANGUAGE_CERTIFICATION_SPEC.md
    - Engineering Concept Spec: ENGINEERING_CONCEPT_SPEC.md
    - Language Equivalence Spec: LANGUAGE_EQUIVALENCE_SPEC.md
    - Java Mapping: JAVA_LANGUAGE_MAPPING.md
  - Engineering Knowledge Graph: ekg.md
  - Reference:
    - CLI Reference: cli_reference.md
    - SDK Guide: sdk_guide.md
    - Plugin Guide: plugin_guide.md
  - Governance:
    - Engineering Principles: engineering_principles.md
    - RFC Index: rfc_index.md
    - ADR Index: adr_index.md
    - Contributing: contributing.md
    - Release Process: release_process.md

markdown_extensions:
