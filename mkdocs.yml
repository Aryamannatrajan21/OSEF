site_name: OSEF Documentation
site_description: Open Source Engineering Framework
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - Architecture:
    - Overview: architecture.md
    - Core Engine & Graph:
      - Policy Engine Architecture: architecture/POLICY_ENGINE_ARCHITECTURE.md
      - Graph Schema: architecture/GRAPH_SCHEMA.md
      - Semantic Model: architecture/SEMANTIC_MODEL.md
      - Semantic Enrichment: architecture/SEMANTIC_ENRICHMENT_SPEC.md
      - Call Graph: architecture/CALL_GRAPH_SPEC.md
      - Symbol Table: architecture/SYMBOL_TABLE_SPEC.md
      - Event Bus: architecture/EVENT_BUS_SPEC.md
      - Parser Contract: architecture/PARSER_CONTRACT.md
      - Analyzer Interface: architecture/ANALYZER_INTERFACE.md
      - Query API: architecture/QUERY_API_SPEC.md
    - Policy Engine (EPE):
      - EPE API: architecture/EPE_API.md
      - EPE Lifecycle: architecture/EPE_LIFECYCLE.md
      - EPE Testing Guide: architecture/EPE_TESTING_GUIDE.md
      - Policy Specification: architecture/POLICY_SPECIFICATION.md
      - Rule Pack Specification: architecture/RULE_PACK_SPECIFICATION.md
      - Rule Writing Guide: architecture/RULE_WRITING_GUIDE.md
    - Intelligence & Benchmarking:
