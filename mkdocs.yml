      - Configuration Intelligence: architecture/CONFIGURATION_INTELLIGENCE_SPEC.md
      - Benchmarking Guide: architecture/BENCHMARKING_GUIDE.md
    - Plugins & Extensions:
      - Plugin API: architecture/PLUGIN_API.md
      - Plugin Manifest: architecture/PLUGIN_MANIFEST_SPEC.md
      - Plugin Capabilities: architecture/PLUGIN_CAPABILITIES_SPEC.md
      - Plugin Registry: architecture/PLUGIN_REGISTRY_SPEC.md
      - Plugin Sandbox: architecture/PLUGIN_SANDBOX_SPEC.md
      - Plugin SDK: architecture/PLUGIN_SDK_SPEC.md
      - Plugin Security Model: architecture/PLUGIN_SECURITY_MODEL.md
      - Plugin State: architecture/PLUGIN_STATE_SPEC.md
      - Marketplace Protocol: architecture/MARKETPLACE_PROTOCOL.md
      - CLI Extension: architecture/CLI_EXTENSION_SPEC.md
      - Extension Context: architecture/EXTENSION_CONTEXT_SPEC.md
      - Extension Developer Guide: architecture/EXTENSION_DEVELOPER_GUIDE.md
      - Extension Host: architecture/EXTENSION_HOST_SPEC.md
