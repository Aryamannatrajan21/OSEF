name: Publish Plugins

on:
  push:
    branches:
      - main
    paths:
      - 'reference-plugins/**'
      - 'scripts/publish_plugins.py'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography hatchling
          mkdir -p osef-studio/out
          pip install -e ".[dev]"

      - name: Build and Sign Plugins
        env:
          OSEF_PLUGIN_PRIVATE_KEY: ${{ secrets.OSEF_PLUGIN_PRIVATE_KEY }}
        run: |
          python scripts/publish_plugins.py

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the old release if it exists so we can recreate it
          gh release delete plugins-latest --yes || true
          gh tag delete plugins-latest --yes || true
          
          # Create a new latest release
          gh release create plugins-latest packages/*.tar.gz \
            --title "Latest OSEF Plugins" \
            --notes "Automatically packaged and signed plugins from the reference-plugins directory."

      - name: Commit marketplace-index.json
        id: cpr
        uses: peter-evans/create-pull-request@v6
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(marketplace): update index"
          title: "Update Marketplace Index"
          body: "Automated PR to update the `marketplace-index.json` after publishing new plugins.\n\n> [!NOTE]\n> If this action fails with a 403, ensure that **'Allow GitHub Actions to create and approve pull requests'** is checked in Settings > Actions > General."
          branch: "update-marketplace-index"
          delete-branch: true
