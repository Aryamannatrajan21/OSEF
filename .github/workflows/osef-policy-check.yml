name: OSEF Policy Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  policy-evaluation:
    name: Evaluate EPE Architecture Policies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OSEF Engine
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run OSEF Policy Check (SARIF output)
        run: |
          osef policy check . --format sarif --output osef-policy-results.sarif

      - name: Upload SARIF report to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: osef-policy-results.sarif
          category: osef-epe
